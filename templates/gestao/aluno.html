<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel do Aluno</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; }
        h1 { color: #333; }
        ul { padding-left: 20px; }
    </style>
</head>
<body>

   <div class="card">
    <h1>Área do Aluno</h1>
    
    <p><strong>Nome:</strong> {{ nome_aluno }}</p>
    <p><strong>Curso Atual:</strong> {{ curso }}</p>
    
    <hr>
    
    <h3>Suas Matérias:</h3>
    <ul>
        {% for disciplina in disciplinas %}
            <li>{{ disciplina.nome }}</li>
        {% empty %}
            <li>Nenhuma disciplina disponível para este curso.</li>
        {% endfor %}
    </ul>
    
    <br>
    <a href="{% url 'index' %}" class="voltar">← Sair / Voltar</a>
</div>
</body>
</html>
